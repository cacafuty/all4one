name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Binary builds (4 targets in parallel) ─────────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: all4one-agent-linux-x86_64.tar.gz
            use_cross: false

          - name: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: all4one-agent-linux-arm64.tar.gz
            use_cross: true

          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: all4one-agent-macos-arm64.tar.gz
            use_cross: false

          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: all4one-agent-windows-x86_64.zip
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # cross provides Docker-based cross-compilation for aarch64-unknown-linux-gnu
      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p all4one-agent
          else
            cargo build --release --target ${{ matrix.target }} -p all4one-agent
          fi

      - name: Package (tar.gz — Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} all4one-agent

      - name: Package (zip — Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\all4one-agent.exe" `
            -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          retention-days: 1

  # ── GitHub Release + checksums ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  # ── Multi-arch Docker image → ghcr.io ──────────────────────────────────────
  docker:
    name: Docker image (linux/amd64 + linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
