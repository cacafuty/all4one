# cargo-audit configuration
# https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
ignore = [
    # fxhash: unmaintained, transitive dep of sled 0.34.7 (our embedded store).
    # No upstream fix available until sled is replaced in a future phase.
    "RUSTSEC-2025-0057",

    # instant: unmaintained, transitive dep of parking_lot 0.11 used by sled 0.34.7.
    # Same root cause as fxhash above.
    "RUSTSEC-2024-0384",

    # rand 0.8: unsound with custom logger, transitive dep of openraft 0.9.
    # Impact is nil for our usage (no custom global logger touching rand).
    "RUSTSEC-2026-0097",
]
