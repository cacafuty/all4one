[node]
tier = 2
availability = "always"
quorum_participant = false
data_dir = "C:/ProgramData/all4one-local"

[roles]
scheduler = false
executor = true
storage = false

[network]
bind_address = "0.0.0.0"
grpc_port = 10947
rest_port = 10946

[discovery]
mdns = false
seeds = ["127.0.0.1:7947"]

[security]
mode = "dev"
shared_secret = "compose-secret"

[executor]
max_concurrent_jobs = 2
docker_socket = "npipe:////./pipe/docker_engine"
cgroups_enabled = false

[capabilities]
docker = true
python = "C:/Python311/python.exe"
wasm = false

[logging]
level = "info"
format = "text"
