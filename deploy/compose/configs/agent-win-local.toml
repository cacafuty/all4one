[node]
tier = 0
availability = "always"
quorum_participant = false
data_dir = "C:/ProgramData/all4one-local"

[roles]
scheduler = true
executor = true
storage = true

[network]
bind_address = "0.0.0.0"
advertise_host = "127.0.0.1"
grpc_port = 7947
rest_port = 7946

[discovery]
mdns = false
# Bootstrap CA issuer - no seeds needed
seeds = []

[security]
mode = "ca"

[executor]
max_concurrent_jobs = 2
docker_socket = "npipe:////./pipe/docker_engine"
cgroups_enabled = false
# Optional: Limit this agent to maximum 4096 MB RAM (even if system has more)
# memory_limit_mb = 4096

[shared_volume]
enabled = true
bucket = "shared-volume"
local_dir = "C:/ProgramData/all4one-local/shared"
policy = "warm"
scan_interval_seconds = 2

[capabilities]
docker = true
python = "C:/Python311/python.exe"
wasm = false

[logging]
level = "info"
format = "text"
