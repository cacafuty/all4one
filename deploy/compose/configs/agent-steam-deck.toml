[node]
tier = 1
availability = "always"
quorum_participant = false
data_dir = "/home/deck/all4one/data"

[roles]
scheduler = true
executor = true
storage = true

[network]
bind_address = "0.0.0.0"
grpc_port = 7947
rest_port = 7946

[discovery]
mdns = false
# Bootstrap from Windows host CA issuer
seeds = ["192.168.1.135:7947"]

[security]
mode = "dev"

[executor]
max_concurrent_jobs = 4
cgroups_enabled = false

[storage]
chunk_size_mb = 64
default_policy = "hot"
encryption_at_rest = false

[capabilities]
docker = true
java = true
python = true
gpu = false
