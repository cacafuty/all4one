[node]
tier = 0
availability = "always"
quorum_participant = false
data_dir = "C:/ProgramData/all4one-local"

[roles]
scheduler = false
executor = true
storage = false

[network]
bind_address = "0.0.0.0"
advertise_host = "127.0.0.1"
grpc_port = 7947
rest_port = 7946

[discovery]
mdns = false
# Local two-agent test: bootstrap also polls peer for symmetric visibility
seeds = ["127.0.0.1:8947"]

[security]
mode = "ca"

[executor]
max_concurrent_jobs = 2
docker_socket = "npipe:////./pipe/docker_engine"
cgroups_enabled = false

[capabilities]
docker = true
python = "C:/Python311/python.exe"
wasm = false

[logging]
level = "info"
format = "text"
