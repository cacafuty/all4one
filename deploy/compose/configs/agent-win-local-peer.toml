[node]
tier = 1
availability = "always"
quorum_participant = false
data_dir = "C:/ProgramData/all4one-local-peer"

[roles]
scheduler = false
executor = true
storage = true

[network]
bind_address = "0.0.0.0"
advertise_host = "127.0.0.1"
grpc_port = 8947
rest_port = 8946

[discovery]
mdns = false
seeds = ["127.0.0.1:7947"]

[security]
mode = "ca"
ca_cert_path = "C:/ProgramData/all4one-local/certs/ca.crt"

[executor]
max_concurrent_jobs = 2
docker_socket = "npipe:////./pipe/docker_engine"
cgroups_enabled = false
# Optional: Limit this agent to maximum 2048 MB RAM (even if system has more)
# memory_limit_mb = 2048

[shared_volume]
enabled = true
bucket = "shared-volume"
local_dir = "C:/ProgramData/all4one-local-peer/shared"
policy = "warm"
scan_interval_seconds = 2

[capabilities]
docker = true
python = "C:/Python311/python.exe"
wasm = false

[logging]
level = "info"
format = "text"
