# 07 — CPU micro-benchmark with POSIX shell executable runtime
runtime: executable
source: /bin/sh
command:
  - -lc
  - |
    count=0
    for n in $(seq 2 200); do
      is_prime=1
      for d in $(seq 2 $((n - 1))); do
        if [ $((n % d)) -eq 0 ]; then
          is_prime=0
          break
        fi
      done
      if [ "$is_prime" -eq 1 ]; then
        count=$((count + 1))
      fi
    done
    echo "prime_count=${count}"
resources:
  cpu_cores: 1
  memory_mb: 128
constraints:
  tier_min: 1
  requires_capabilities: {}