services:
  agent-a:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    container_name: all4one-agent-a
    command: ["start", "--config", "/configs/agent-a.toml"]
    volumes:
      - ./configs:/configs:ro
      - agent_a_data:/var/lib/all4one
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7946:7946"
      - "7947:7947"
    networks:
      - all4one
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-b:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    container_name: all4one-agent-b
    command: ["start", "--config", "/configs/agent-b.toml"]
    volumes:
      - ./configs:/configs:ro
      - agent_b_data:/var/lib/all4one
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8946:7946"
      - "8947:7947"
    depends_on:
      - agent-a
    networks:
      - all4one
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-c:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    container_name: all4one-agent-c
    command: ["start", "--config", "/configs/agent-c.toml"]
    volumes:
      - ./configs:/configs:ro
      - agent_c_data:/var/lib/all4one
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9946:7946"
      - "9947:7947"
    depends_on:
      - agent-a
    networks:
      - all4one
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  agent_a_data:
  agent_b_data:
  agent_c_data:

networks:
  all4one:
    driver: bridge
